<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Subtitle Target</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-a: #1d1714;
      --bg-b: #0f1012;
      --panel: rgba(0, 0, 0, 0.6);
      --text: #ffffff;
      --rule: rgba(255, 255, 255, 0.86);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      background:
        radial-gradient(circle at 18% 30%, rgba(171, 105, 66, 0.45), transparent 24%),
        radial-gradient(circle at 72% 28%, rgba(117, 125, 142, 0.24), transparent 28%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(0, 0, 0, 0.22)),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 0 24px 8vh;
    }

    .subtitle-band {
      width: min(72vw, 980px);
      background: var(--panel);
      padding: 14px 28px 18px;
      text-align: center;
      border-radius: 2px;
    }

    .speaker {
      font-size: 33px;
      line-height: 1.05;
      font-weight: 600;
      letter-spacing: 0.01em;
      margin: 0 0 12px;
    }

    .rule {
      height: 1px;
      width: 100%;
      background: var(--rule);
      margin: 0 0 14px;
    }

    .body {
      margin: 0;
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      font-size: 31px;
      line-height: 1.3;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.65);
    }
  </style>
</head>
<body>
  <section class="subtitle-band" aria-label="Story subtitle target reference">
    <h1 class="speaker">Max</h1>
    <div class="rule"></div>
    <p class="body">I'm not about to leave before I've gotten a few good photos of this joint.</p>
  </section>
</body>
</html>
